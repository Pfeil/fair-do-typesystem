name: typesystem-tests

on:
  push:
    paths:
      - "typesystem/**"
  pull_request:
    branches:
      - "main"
      - "dev*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Run tests
        working-directory: typesystem
        run: uv run --dev pytest
